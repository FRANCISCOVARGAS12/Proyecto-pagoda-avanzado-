<section class="toast-stack" aria-live="polite" aria-label="Notificaciones">
  @for (toast of toasts(); track toast.id) {
    <article class="toast" [class.success]="toast.type === 'success'" [class.error]="toast.type === 'error'">
      <p>{{ toast.text }}</p>
      <button type="button" (click)="close(toast.id)" aria-label="Cerrar notificación">✕</button>
    </article>
  }
</section>
