<section class="page">
  <h1 class="page-title large">Reporte de Propinas</h1>

  <div class="date-filters">
    <select
      [(ngModel)]="rangePreset"
      (ngModelChange)="onPresetChange()"
      class="control-input"
    >
      <option value="weekly">Semanal</option>
      <option value="monthly">Mensual</option>
      <option value="custom">Personalizado</option>
    </select>

    <div class="date-field">
      <label for="startDate">Fecha de Inicio</label>
      <input id="startDate" type="date" [(ngModel)]="startDate" (change)="onDateRangeChange()" />
    </div>
    <div class="date-field">
      <label for="endDate">Fecha de Fin</label>
      <input id="endDate" type="date" [(ngModel)]="endDate" (change)="onDateRangeChange()" />
    </div>
  </div>

  <p class="range-caption">Rango seleccionado: {{ rangeLabel() }}</p>

  <div class="tip-wrapper">
    <div class="tip-card">
      <p>Total Propinas Generadas</p>
      <strong>{{ fmt(totalPropinas) }}</strong>
      @if (infoMessage) {
        <small>{{ infoMessage }}</small>
      }
    </div>
  </div>
</section>
