<section class="page">
  <h1 class="page-title large">Reporte de Propinas</h1>

  <div class="date-filters">
    <select
      [(ngModel)]="rangePreset"
      (ngModelChange)="onPresetChange()"
      class="control-input"
    >
      <option value="biweekly">Quincenal (15 días)</option>
    </select>

    <div class="date-field">
      <label for="startDate">Fecha de Inicio</label>
      <input
        id="startDate"
        type="date"
        [(ngModel)]="startDate"
        (ngModelChange)="onDateRangeChange('start')"
      />
    </div>
    <div class="date-field">
      <label for="endDate">Fecha de Fin</label>
      <input
        id="endDate"
        type="date"
        [(ngModel)]="endDate"
        (ngModelChange)="onDateRangeChange('end')"
      />
    </div>
  </div>

  <div class="period-nav">
    <button
      type="button"
      class="secondary-btn"
      [disabled]="!canGoToPreviousPeriod()"
      (click)="goToPreviousPeriod()"
    >
      ← 15 días
    </button>
    <button
      type="button"
      class="secondary-btn"
      [disabled]="!canGoToNextPeriod()"
      (click)="goToNextPeriod()"
    >
      15 días →
    </button>
  </div>

  <p class="range-caption">Periodo quincenal: {{ rangeLabel() }}</p>

  <div class="tip-wrapper">
    <div class="tip-card">
      <p>Total Propinas Generadas</p>
      <strong>{{ fmt(totalPropinas) }}</strong>
      @if (infoMessage) {
        <small>{{ infoMessage }}</small>
      }
    </div>
  </div>
</section>
