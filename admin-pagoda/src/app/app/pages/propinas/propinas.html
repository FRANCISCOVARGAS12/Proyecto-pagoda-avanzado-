<section class="page">
  <h1 class="page-title">Propinas</h1>

  <div class="date-filters">
    <button type="button" (click)="irPeriodoActual()" class="control-btn">Periodo actual</button>
    <button type="button" (click)="periodoAnterior()" class="control-btn">← Anterior</button>
    <button type="button" (click)="periodoSiguiente()" class="control-btn">Siguiente →</button>

    <div class="date-field">
      <label for="startDate">Inicio</label>
      <input id="startDate" type="date" [(ngModel)]="startDate" (change)="onDateRangeChange()" />
    </div>
    <div class="date-field">
      <label for="endDate">Fin</label>
      <input id="endDate" type="date" [(ngModel)]="endDate" (change)="onDateRangeChange()" />
    </div>
  </div>

  <p class="range-caption">{{ rangeLabel() }}</p>

  @if (cargando) {
    <p class="info-message">Cargando…</p>
  } @else {
    <div class="total-card">
      <h2>Total acumulado de propinas</h2>
      <p class="monto">{{ fmt(acumulado) }}</p>
    </div>
  }

  @if (infoMessage) {
    <p class="info-message">{{ infoMessage }}</p>
  }
</section>
