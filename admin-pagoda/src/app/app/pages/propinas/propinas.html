<section class="page">
  <h1 class="page-title">Propinas</h1>

  <div class="date-filters">
    <button type="button" (click)="irPeriodoActual()" class="secondary-btn">Periodo actual</button>
    <button type="button" (click)="periodoAnterior()" class="secondary-btn">← Anterior</button>
    <button type="button" (click)="periodoSiguiente()" class="secondary-btn">Siguiente →</button>

    <div class="date-field">
      <label for="startDate">Inicio</label>
      <input id="startDate" type="date" [(ngModel)]="startDate" (change)="onDateRangeChange()" />
    </div>
    <div class="date-field">
      <label for="endDate">Fin</label>
      <input id="endDate" type="date" [(ngModel)]="endDate" (change)="onDateRangeChange()" />
    </div>
  </div>

  <p class="range-caption">{{ rangeLabel() }}</p>
  <p class="range-caption">
    Modo: {{ isCurrentPeriodSelected() ? 'Tiempo real activo' : 'Rango historico (sin tiempo real)' }}
  </p>

  @if (cargando) {
    <p class="range-caption">Cargando…</p>
  } @else {
    <div class="tip-wrapper">
      <div class="tip-card">
        <p>Total acumulado de propinas</p>
        <strong>{{ fmt(acumulado) }}</strong>
      </div>
    </div>
  }

  @if (infoMessage) {
    <p class="range-caption">{{ infoMessage }}</p>
  }
</section>
