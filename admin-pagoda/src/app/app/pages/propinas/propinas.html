<section class="page">
  <h1 class="page-title large">Reporte de Propinas</h1>

  <div class="date-filters">
    <div class="date-field">
      <label for="startDate">Fecha de Inicio</label>
      <input id="startDate" type="date" [(ngModel)]="startDate" />
    </div>
    <div class="date-field">
      <label for="endDate">Fecha de Fin</label>
      <input id="endDate" type="date" [(ngModel)]="endDate" />
    </div>
  </div>

  <div class="tip-wrapper">
    <div class="tip-card">
      <p>Total Propinas Generadas</p>
      <strong>${{ totalPropinas.toLocaleString() }}.00</strong>
      @if (infoMessage) {
        <small>{{ infoMessage }}</small>
      }
    </div>
  </div>
</section>
